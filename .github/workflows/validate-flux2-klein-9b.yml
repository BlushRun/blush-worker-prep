name: validate-flux2-klein-9b

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: astral-sh/setup-uv@v4
      - name: Sync submodules
        run: uv run worker-prep sync-submodules
      - name: Validate worker artifacts
        run: uv run worker-prep validate --repo submodules/flux2-klein-9b
      - name: Hydrate runtime assets
        run: uv run worker-prep hydrate-build --repo submodules/flux2-klein-9b --force
      - name: Validate compose config
        run: docker compose --env-file submodules/flux2-klein-9b/.env.local.example -f submodules/flux2-klein-9b/docker-compose.yml config
